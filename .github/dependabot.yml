# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      cargo-dependencies:
        patterns:
          - "*"
    versioning-strategy: auto
    cooldown:
      default-days: 5
  
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      npm-dependencies:
        patterns:
          - "*"
  
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions-dependencies:
        patterns:
          - "*"

  # Docker base-image updates for service and release Dockerfiles.
  # Dependabot will open a single reviewable PR per image update that
  # refreshes both the readable tag and the SHA-256 digest pin.
  - package-ecosystem: "docker"
    directories:
      - "/"
      - "/crates/evefrontier-service-route"
      - "/crates/evefrontier-service-scout-gates"
      - "/crates/evefrontier-service-scout-range"
    schedule:
      interval: "weekly"
    groups:
      docker-base-images:
        patterns:
          - "rust"
          - "gcr.io/distroless/cc-debian12"
