# Docker Container Image Build and Release Workflow
#
# This workflow builds, scans, signs, and publishes container images
# for the EVE Frontier microservices when a version tag is pushed.
#
# Security features:
# - Trivy vulnerability scanning (CRITICAL, HIGH severity)
# - Cosign keyless signing using GitHub OIDC
# - SBOM generation with syft
# - Multi-architecture builds (amd64, arm64)
#
# Triggered on: Push of tags matching v*
#
# Required permissions:
# - contents: read
# - packages: write
# - id-token: write (for cosign OIDC)
# - security-events: write (for Trivy results)

name: Docker Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to build (e.g., v0.1.0)'
        required: true
        type: string

# Workflow-level permissions: minimal by default (principle of least privilege)
# Each job explicitly declares the permissions it needs
permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/scetrov/evefrontier-rs

jobs:
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: aarch64-unknown-linux-musl
            arch: arm64

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          # Strip 'v' prefix to match docker/metadata-action semver output
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203 # stable
        with:
          toolchain: "1.94.1"
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        run: |
          cargo install cargo-zigbuild --locked

      - name: Install zig
        uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406 # v2.2.1
        with:
          version: 0.13.0

      - name: Build services
        run: |
          cargo zigbuild --release --target ${{ matrix.target }} \
            -p evefrontier-service-route \
            -p evefrontier-service-scout-gates \
            -p evefrontier-service-scout-range

      - name: Create artifact directory
        run: |
          mkdir -p artifacts/${{ matrix.arch }}
          cp target/${{ matrix.target }}/release/evefrontier-service-route artifacts/${{ matrix.arch }}/
          cp target/${{ matrix.target }}/release/evefrontier-service-scout-gates artifacts/${{ matrix.arch }}/
          cp target/${{ matrix.target }}/release/evefrontier-service-scout-range artifacts/${{ matrix.arch }}/

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-${{ matrix.arch }}
          path: artifacts/${{ matrix.arch }}
          retention-days: 1

  build-images:
    name: Build and Push Images
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write

    strategy:
      matrix:
        service:
          - route
          - scout-gates
          - scout-range

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download amd64 binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries-amd64
          path: artifacts/amd64

      - name: Download arm64 binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries-arm64
          path: artifacts/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_PREFIX }}/evefrontier-service-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Create multi-arch Dockerfile
        run: |
          cat > Dockerfile.multiarch <<'EOF'
          FROM gcr.io/distroless/cc-debian12:nonroot
          ARG TARGETARCH
          ARG SERVICE
          COPY artifacts/${TARGETARCH}/evefrontier-service-${SERVICE} /service
          USER 65532:65532
          EXPOSE 8080
          ENTRYPOINT ["/service"]
          EOF

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile.multiarch
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SERVICE=${{ matrix.service }}

      - name: Log image digest
        run: echo "Image digest for ${{ matrix.service }}:${{ needs.build-binaries.outputs.version }} is ${{ steps.build.outputs.digest }}"

  scan-images:
    name: Scan Images
    needs: [build-binaries, build-images]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    strategy:
      matrix:
        service:
          - route
          - scout-gates
          - scout-range

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: '${{ env.IMAGE_PREFIX }}/evefrontier-service-${{ matrix.service }}:${{ needs.build-binaries.outputs.version }}'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          # NOTE: We ignore "unfixed" vulnerabilities in the container base image.
          # - Rust dependencies are scanned separately with `cargo-audit`.
          # - Trivy scans the full container image (including the distroless base).
          # - "unfixed" here means no upstream vendor patch exists yet; we rely on
          #   the Google-maintained distroless base image to ship security fixes.
          # - We still fail the build on CRITICAL/HIGH issues when a fix is available.
          #
          # For the full security policy, rationale, and the process for monitoring
          # when fixes become available, see:
          #   - docs/SECURITY_AUDIT.md (container image scanning section)
          #   - docs/adrs/0007-devsecops-practices.md (DevSecOps practices ADR)
          ignore-unfixed: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'
          category: 'trivy-${{ matrix.service }}'

  sign-images:
    name: Sign Images
    needs: [build-binaries, build-images, scan-images]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      matrix:
        service:
          - route
          - scout-gates
          - scout-range

    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign container image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ${{ env.IMAGE_PREFIX }}/evefrontier-service-${{ matrix.service }}:${{ needs.build-binaries.outputs.version }}

  generate-sbom:
    name: Generate SBOM
    needs: [build-binaries, build-images]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - route
          - scout-gates
          - scout-range

    steps:
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate SBOM
        run: |
          syft ${{ env.IMAGE_PREFIX }}/evefrontier-service-${{ matrix.service }}:${{ needs.build-binaries.outputs.version }} \
            -o spdx-json=sbom-${{ matrix.service }}.spdx.json \
            -o cyclonedx-json=sbom-${{ matrix.service }}.cyclonedx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ matrix.service }}
          path: |
            sbom-${{ matrix.service }}.spdx.json
            sbom-${{ matrix.service }}.cyclonedx.json
          retention-days: 90

  summary:
    name: Release Summary
    needs: [build-binaries, build-images, scan-images, sign-images, generate-sbom]
    runs-on: ubuntu-latest
    permissions: {}
    if: always()

    steps:
      - name: Generate summary
        run: |
          VERSION="${{ needs.build-binaries.outputs.version }}"

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          # Docker Release Summary

          **Version**: ${VERSION}
          **Registry**: ghcr.io

          ## Images

          | Service | Image | Status |
          |---------|-------|--------|
          | route | \`${{ env.IMAGE_PREFIX }}/evefrontier-service-route:${VERSION}\` | ${{ needs.build-images.result == 'success' && '✅' || '❌' }} |
          | scout-gates | \`${{ env.IMAGE_PREFIX }}/evefrontier-service-scout-gates:${VERSION}\` | ${{ needs.build-images.result == 'success' && '✅' || '❌' }} |
          | scout-range | \`${{ env.IMAGE_PREFIX }}/evefrontier-service-scout-range:${VERSION}\` | ${{ needs.build-images.result == 'success' && '✅' || '❌' }} |

          ## Security

          | Check | Status |
          |-------|--------|
          | Trivy Scan | ${{ needs.scan-images.result == 'success' && '✅ Passed' || '❌ Failed' }} |
          | Cosign Signing | ${{ needs.sign-images.result == 'success' && '✅ Signed' || '❌ Failed' }} |
          | SBOM Generation | ${{ needs.generate-sbom.result == 'success' && '✅ Generated' || '❌ Failed' }} |

          ## Verification

          To verify image signatures:

          \`\`\`bash
          # Install cosign
          # https://docs.sigstore.dev/cosign/installation/

          # Verify signature (ensures image was built by this repository's release workflow)
          cosign verify \\
            --certificate-identity="https://github.com/${{ github.repository }}/.github/workflows/docker-release.yml@refs/tags/${VERSION}" \\
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \\
            ${{ env.IMAGE_PREFIX }}/evefrontier-service-route:${VERSION}
          \`\`\`

          ## Pull Commands

          \`\`\`bash
          docker pull ${{ env.IMAGE_PREFIX }}/evefrontier-service-route:${VERSION}
          docker pull ${{ env.IMAGE_PREFIX }}/evefrontier-service-scout-gates:${VERSION}
          docker pull ${{ env.IMAGE_PREFIX }}/evefrontier-service-scout-range:${VERSION}
          \`\`\`
          EOF
