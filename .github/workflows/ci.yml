name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test workspace
    runs-on: ubuntu-latest
    env:
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.97.0"
          components: clippy, rustfmt

      - name: Cache cargo directories
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Run lint (cargo fmt check)
        run: pnpm nx run-many -t lint --exclude evefrontier-rs

      - name: Run clippy
        run: pnpm nx run-many -t clippy --exclude evefrontier-rs

      - name: Build workspace
        run: pnpm nx run-many -t build --exclude evefrontier-rs

      - name: Test workspace
        run: pnpm nx run-many -t test --exclude evefrontier-rs

  validate-docs-examples:
    name: Validate documentation examples
    runs-on: ubuntu-latest
    env:
      EVEFRONTIER_SHIP_DATA: ${{ github.workspace }}/docs/fixtures/ship_data.csv
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.97.0"

      - name: Install jq for JSON validation
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Cache cargo directories
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Build CLI
        run: cargo build --release -p evefrontier-cli

      - name: Prepare fixture database
        run: |
          echo -e "requested=tag\nresolved=fixture" > docs/fixtures/minimal/static_data.db.release

      - name: Test route command (README example - Nod to Brana)
        run: |
          EVEFRONTIER_DATASET_SOURCE="$(pwd)/docs/fixtures/minimal/static_data.db" ./target/release/evefrontier-cli --data-dir /tmp/test-route route --from "Nod" --to "Brana"

      - name: Test route command with JSON output (README example)
        run: |
          EVEFRONTIER_DATASET_SOURCE="$(pwd)/docs/fixtures/minimal/static_data.db" ./target/release/evefrontier-cli --data-dir /tmp/test-json --format json route --from "Nod" --to "Brana" > /tmp/output.json
          jq -e '.kind == "route"' /tmp/output.json || (echo "JSON output validation failed" && exit 1)

      - name: Test basic format path-style output (README example)
        run: |
          EVEFRONTIER_DATASET_SOURCE="$(pwd)/docs/fixtures/minimal/static_data.db" ./target/release/evefrontier-cli --data-dir /tmp/test-basic --format basic route --from "Nod" --to "Brana"

      - name: Test algorithm selection
        run: |
          EVEFRONTIER_DATASET_SOURCE="$(pwd)/docs/fixtures/minimal/static_data.db" ./target/release/evefrontier-cli --data-dir /tmp/test-algo route --from "Nod" --to "Brana" --algorithm dijkstra

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect dependency audit scopes
        id: audit-scope
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed-files.txt
          else
            # Pushes to main are the integration safety net; run every audit scope.
            printf '%s\n' Cargo.lock package.json > changed-files.txt
          fi

          rust_changed=false
          node_changed=false

          if grep -Eq '^(Cargo\.toml|Cargo\.lock|\.cargo/|\.rust-toolchain|rust-toolchain\.toml|clippy\.toml|rustfmt\.toml|crates/|src/|examples/|benches/|tests/|\.github/workflows/)' changed-files.txt; then
            rust_changed=true
          fi

          if grep -Eq '^(package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml|nx\.json|\.nvmrc|\.npmrc|scripts/|\.github/workflows/)' changed-files.txt; then
            node_changed=true
          fi

          echo "rust_changed=$rust_changed" >> "$GITHUB_OUTPUT"
          echo "node_changed=$node_changed" >> "$GITHUB_OUTPUT"

          echo "Changed files considered for dependency audits:"
          cat changed-files.txt
          echo "Rust audit required: $rust_changed"
          echo "Node audit required: $node_changed"

      - name: Set up Rust
        if: steps.audit-scope.outputs.rust_changed == 'true'
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.97.0"

      - name: Cache cargo directories
        if: steps.audit-scope.outputs.rust_changed == 'true'
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install cargo-audit
        if: steps.audit-scope.outputs.rust_changed == 'true'
        run: cargo install cargo-audit --locked

      - name: Run Rust security audit
        if: steps.audit-scope.outputs.rust_changed == 'true'
        run: cargo audit

      - name: Set up Node.js
        if: steps.audit-scope.outputs.node_changed == 'true'
        uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        if: steps.audit-scope.outputs.node_changed == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Install Node dependencies
        if: steps.audit-scope.outputs.node_changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run Node security audit
        if: steps.audit-scope.outputs.node_changed == 'true'
        run: pnpm audit --audit-level high

      - name: Skip security audits
        if:
          steps.audit-scope.outputs.rust_changed != 'true' && steps.audit-scope.outputs.node_changed
          != 'true'
        run: echo "No Rust or Node dependency-impacting paths changed; skipping dependency audits."

  spatial-index-freshness:
    name: Verify spatial index freshness
    runs-on: ubuntu-latest
    needs: build-and-test # Run after tests pass
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.97.0"

      - name: Cache cargo directories
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Build CLI
        run: cargo build --release -p evefrontier-cli

      - name: Prepare fixture for verification
        run: |
          # Create a release marker for the fixture
          echo -e "requested=fixture\nresolved=fixture-v1" > docs/fixtures/minimal/static_data.db.release
          # Build the spatial index for the fixture
          ./target/release/evefrontier-cli --no-logo --no-footer --data-dir docs/fixtures index-build --force

      - name: Verify spatial index freshness
        run: |
          ./target/release/evefrontier-cli --no-logo --no-footer --data-dir docs/fixtures index-verify --json

      - name: Report verification status
        if: failure()
        run: |
          echo "::error::Spatial index is out of sync with the dataset. Run 'evefrontier-cli index-build' to regenerate."

  complexity-check:
    name: Code complexity analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.97.0"
          components: clippy

      - name: Cache cargo directories
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Run complexity analysis with clippy
        run: |
          # Enable complexity-related lints from the restriction/pedantic categories
          # cognitive_complexity: functions with complexity > 15 (configured in clippy.toml)
          # too_many_lines: functions with > 100 lines
          # excessive_nesting: nesting depth > 8
          #
          # Note: This is an informational check. Warnings are reported but don't fail the build.
          # The --cap-lints=warn flag ensures we only warn (not error) on these complexity issues.
          # Use this output to identify areas for refactoring.
          cargo clippy --workspace --all-targets -- \
            -W clippy::cognitive_complexity \
            -W clippy::too_many_lines \
            -W clippy::excessive_nesting \
            --cap-lints=warn || true

  ship-downloader-tests:
    name: Ship downloader & checksum tests
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.97.0"

      - name: Cache cargo directories
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-shiptests
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Run ship downloader & checksum tests
        run: |
          # Run only the relevant tests in evefrontier-lib for deterministic, fast feedback
          cargo test -p evefrontier-lib --test dataset_download_ship_data --quiet
