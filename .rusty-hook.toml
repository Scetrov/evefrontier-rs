[hooks]
pre-commit = """
set -e
echo "🔍 Running pre-commit checks via Nx (serialized)..."
echo ""

# 0. Stabilize environment to avoid target dir races
export CARGO_TARGET_DIR="$PWD/target"
export NX_DAEMON=false
export NX_INTERACTIVE=false

# 1. Format (Rust)
echo "1️⃣  Checking Rust formatting..."
cargo fmt --all -- --check || {
    echo "❌ Format check failed. Run: cargo fmt --all"
    exit 1
}
echo "   ✅ Format OK"
echo ""

# 2. Build (once) — serialize to avoid target dir races
echo "2️⃣  Building all projects via Nx (parallel=1)..."
pnpm nx run-many --target=build --all --parallel=1 || {
    echo "❌ Nx build failed"
    exit 1
}
echo "   ✅ Build OK"
echo ""

# 3. Clippy (no redundant build)
echo "3️⃣  Running clippy via Nx (parallel=1)..."
pnpm nx run-many --target=clippy --all --parallel=1 || {
    echo "❌ Clippy failed"
    exit 1
}
echo "   ✅ Clippy OK"
echo ""

# 4. Tests — also serialized
echo "4️⃣  Running tests via Nx (parallel=1)..."
pnpm nx run-many --target=test --all --parallel=1 || {
    echo "❌ Tests failed"
    exit 1
}
echo "   ✅ Tests OK"
echo ""

# 5. Security audit (fail on RustSec advisories, allow yanked/unmaintained warnings)
echo "5️⃣  Running cargo audit..."
cargo audit || {
    echo "❌ Security vulnerabilities detected"
    exit 1
}
echo "   ✅ Audit OK"
echo ""

echo "✅ All pre-commit checks passed!"
"""

[logging]
verbose = true
